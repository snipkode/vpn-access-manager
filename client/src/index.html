<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
  <title>VPN Access Client</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--bg-tertiary);
      -webkit-app-region: no-drag;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon { font-size: 28px; }
    .logo-text { font-size: 18px; font-weight: 600; }
    .logo-text span { color: var(--accent); }

    .window-controls { display: flex; gap: 8px; }
    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .window-btn.minimize { background: #fbbf24; }
    .window-btn.close { background: #ef4444; }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px 0;
    }

    /* Status Ring */
    .status-container {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid var(--bg-tertiary);
      transition: all 0.3s ease;
    }

    .status-ring.connected {
      border-color: var(--success);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    .status-inner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-icon { font-size: 42px; transition: all 0.3s ease; }
    .status-icon.connected { filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.5)); }

    .status-text {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-text.connected { color: var(--success); font-weight: 600; }

    /* Connection Info */
    .connection-info {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 14px 20px;
      width: 100%;
      max-width: 320px;
      display: none;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--bg-tertiary);
    }
    .info-row:last-child { border-bottom: none; }

    .info-label { color: var(--text-secondary); font-size: 12px; }
    .info-value { color: var(--text-primary); font-size: 12px; font-weight: 500; }
    .info-value.connected { color: var(--success); }

    /* Connect Button */
    .connect-btn {
      -webkit-app-region: no-drag;
      width: 100%;
      max-width: 320px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .connect-btn.disconnected {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
    }

    .connect-btn.connected {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .connect-btn:hover { transform: translateY(-2px); }
    .connect-btn:active { transform: translateY(0); }

    /* Auto Connect */
    .auto-connect {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 320px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: 8px;
      -webkit-app-region: no-drag;
    }

    .auto-connect-label { font-size: 12px; color: var(--text-secondary); }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--bg-tertiary);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .toggle.active { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    .toggle.active::after { transform: translateX(18px); }

    /* Config Section */
    .config-section {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      max-width: 320px;
      -webkit-app-region: no-drag;
    }

    .config-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .config-title { font-size: 13px; color: var(--text-secondary); }
    .config-name {
      font-size: 12px;
      color: var(--text-primary);
      background: var(--bg-tertiary);
      padding: 4px 8px;
      border-radius: 5px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .config-actions { display: flex; gap: 8px; }

    .config-btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .import-btn { background: var(--accent); color: white; }
    .import-btn:hover { background: var(--accent-hover); }
    .remove-btn { background: var(--bg-tertiary); color: var(--text-secondary); }
    .remove-btn:hover { background: var(--danger); color: white; }

    /* Footer */
    .footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid var(--bg-tertiary);
      font-size: 11px;
      color: var(--text-secondary);
      -webkit-app-region: no-drag;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 6px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--bg-tertiary);
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      -webkit-app-region: no-drag;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🔐</span>
        <span class="logo-text">VPN <span>Access</span></span>
      </div>
      <div class="window-controls">
        <button class="window-btn minimize" onclick="window.minimize()"></button>
        <button class="window-btn close" onclick="window.hide()"></button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Status Ring -->
      <div class="status-container">
        <div class="status-ring" id="statusRing"></div>
        <div class="status-inner">
          <div class="status-icon" id="statusIcon">🛡️</div>
          <div class="status-text" id="statusText">Disconnected</div>
        </div>
      </div>

      <!-- Connection Info -->
      <div class="connection-info" id="connectionInfo">
        <div class="info-row">
          <span class="info-label">Connected Since</span>
          <span class="info-value" id="connectedSince">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Protocol</span>
          <span class="info-value">WireGuard</span>
        </div>
        <div class="info-row">
          <span class="info-label">Status</span>
          <span class="info-value connected">Active</span>
        </div>
      </div>

      <!-- Connect Button -->
      <button class="connect-btn disconnected" id="connectBtn" onclick="toggleConnection()">
        🔌 Connect
      </button>

      <!-- Auto Connect -->
      <div class="auto-connect">
        <span class="auto-connect-label">Auto-connect on startup</span>
        <div class="toggle" id="autoConnectToggle" onclick="toggleAutoConnect()"></div>
      </div>

      <!-- Config Section -->
      <div class="config-section">
        <div class="config-header">
          <span class="config-title">Configuration</span>
          <span class="config-name" id="configName">No config loaded</span>
        </div>
        <div class="config-actions">
          <button class="config-btn import-btn" onclick="importConfig()">📁 Import</button>
          <button class="config-btn remove-btn" onclick="removeConfig()">🗑️ Remove</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      VPN Access Client v1.0.0 | <a href="#" onclick="openWebsite()">vpn-access.io</a>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const { ipcRenderer } = require('electron');
    const Store = require('electron-store');
    const store = new Store();

    let isConnected = false;
    let configLoaded = false;

    // Initialize app
    async function init() {
      const stored = await ipcRenderer.invoke('get-stored-config');
      if (stored.configName) {
        configLoaded = true;
        document.getElementById('configName').textContent = stored.configName;
      }

      const status = await ipcRenderer.invoke('get-connection-status');
      isConnected = status.connected;

      const autoConnect = await ipcRenderer.invoke('get-auto-connect');
      if (autoConnect) document.getElementById('autoConnectToggle').classList.add('active');

      updateUI();

      ipcRenderer.on('connection-status', (event, data) => {
        isConnected = data.connected;
        updateUI();
      });
    }

    // Update UI based on connection state
    function updateUI() {
      const elements = {
        ring: document.getElementById('statusRing'),
        icon: document.getElementById('statusIcon'),
        text: document.getElementById('statusText'),
        btn: document.getElementById('connectBtn'),
        info: document.getElementById('connectionInfo')
      };

      if (isConnected) {
        elements.ring.classList.add('connected');
        elements.icon.classList.add('connected');
        elements.text.classList.add('connected');
        elements.text.textContent = 'Connected';
        elements.btn.textContent = '⏹️ Disconnect';
        elements.btn.classList.remove('disconnected');
        elements.btn.classList.add('connected');
        elements.info.style.display = 'block';

        const stored = store.get('connectedAt');
        if (stored) {
          document.getElementById('connectedSince').textContent = new Date(stored).toLocaleTimeString();
        }
      } else {
        elements.ring.classList.remove('connected');
        elements.icon.classList.remove('connected');
        elements.text.classList.remove('connected');
        elements.text.textContent = 'Disconnected';
        elements.btn.textContent = '🔌 Connect';
        elements.btn.classList.remove('connected');
        elements.btn.classList.add('disconnected');
        elements.info.style.display = 'none';
      }
    }

    // Toggle VPN connection
    async function toggleConnection() {
      if (!configLoaded) {
        showToast('Please import a VPN configuration first', 'error');
        return;
      }
      const result = await ipcRenderer.invoke('toggle-connection');
      isConnected = result.connected;
      updateUI();
    }

    // Import configuration
    async function importConfig() {
      const result = await ipcRenderer.invoke('import-config');
      if (result.success) {
        configLoaded = true;
        document.getElementById('configName').textContent = result.name;
        showToast('Configuration imported successfully!', 'success');
      }
    }

    // Remove configuration
    async function removeConfig() {
      if (isConnected) {
        showToast('Please disconnect first', 'error');
        return;
      }
      const result = await ipcRenderer.invoke('remove-config');
      if (result.success) {
        configLoaded = false;
        document.getElementById('configName').textContent = 'No config loaded';
        showToast('Configuration removed', 'success');
      } else {
        showToast(result.error, 'error');
      }
    }

    // Toggle auto-connect
    async function toggleAutoConnect() {
      const toggle = document.getElementById('autoConnectToggle');
      const isActive = toggle.classList.contains('active');
      await ipcRenderer.invoke('set-auto-connect', !isActive);
      toggle.classList.toggle('active');
    }

    // Show toast notification
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Open website
    function openWebsite() {
      ipcRenderer.invoke('open-external', 'https://vpn-access.io');
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
